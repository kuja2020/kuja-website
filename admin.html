<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>KUJA Admin Panel</title>
  <link rel="stylesheet" href="css/bootstrap.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center">

  <div class="w-full max-w-md bg-white rounded-xl shadow-2xl overflow-hidden border-t-8 border-[#fcc334]">
    <div class="bg-[#082465] p-6 text-center">
      <h2 class="text-2xl font-bold text-white uppercase tracking-wider">Add New Notice</h2>
    </div>

    <form id="noticeForm" class="p-8 space-y-5">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Notice Subject</label>
        <input type="text" id="title" class="w-full border-2 border-gray-200 p-2 rounded-lg focus:border-[#082465] focus:outline-none transition" placeholder="e.g. Recruitment Notice 2026" required>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Notice Image</label>
        <input type="file" id="image" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-[#082465] file:text-white hover:file:bg-[#fcc334] hover:file:text-[#082465] cursor-pointer" accept="image/*" required>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Details Link (Optional)</label>
        <input type="url" id="details" class="w-full border-2 border-gray-200 p-2 rounded-lg focus:border-[#082465] focus:outline-none transition" placeholder="https://example.com/details">
      </div>

      <button type="submit" id="submitBtn" class="w-full bg-[#082465] text-white font-bold py-3 rounded-lg hover:shadow-lg active:scale-95 transition-all">
        PUBLISH NOW
      </button>
      
      <p id="status" class="text-center text-sm font-medium mt-4"></p>
    </form>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // আপনার Firebase Config এখানে দিন
    const firebaseConfig = {
      apiKey: "AIzaSyBMMbqW-hZEAGFbLgCkLkwD7-KDR3976lg",
      authDomain: "kuja-web.firebaseapp.com",
      projectId: "kuja-web",
      storageBucket: "kuja-web.firebasestorage.app",
      messagingSenderId: "66586196424",
      appId: "1:66586196424:web:d018284928f5e0021068fd"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const form = document.getElementById('noticeForm');
    const status = document.getElementById('status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      status.innerText = "Processing...";
      status.className = "text-center text-sm font-medium mt-4 text-blue-600";

      const title = document.getElementById('title').value;
      const details = document.getElementById('details').value;
      const imageFile = document.getElementById('image').files[0];

      // ১. ImgBB-তে ছবি আপলোড করা (ফ্রি ইমেজ হোস্টিং)
      const formData = new FormData();
      formData.append("image", imageFile);
      
      try {
        // এই API কি টি আমি ইভেন্টলি দিয়েছি, আপনি চাইলে নিজেরটাও নিতে পারেন ImgBB থেকে
        const imgResponse = await fetch("https://api.imgbb.com/1/upload?key=4ce47b896218489099e0f7b7acf5c023", {
          method: "POST",
          body: formData
        });
        const imgData = await imgResponse.json();
        const imageUrl = imgData.data.url;

        // ২. Firestore-এ ডাটা সেভ করা
        await addDoc(collection(db, "notices"), {
          subject: title,
          img: imageUrl,
          link: details || "#",
          createdAt: serverTimestamp()
        });

        status.innerText = "Notice Published Successfully!";
        status.className = "text-center text-sm font-medium mt-4 text-green-600";
        form.reset();
      } catch (error) {
        status.innerText = "Error: " + error.message;
        status.className = "text-center text-sm font-medium mt-4 text-red-600";
      }
    });
  </script>
</body>
</html>
