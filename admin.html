<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KUJA Admin Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body class="bg-slate-50 min-h-screen font-sans">

  <div id="login-screen" class="flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-sm border-t-4 border-[#fcc334]">
      <h2 class="text-2xl font-bold text-[#082465] text-center mb-6">ADMIN LOGIN</h2>
      <input type="email" id="login-email" placeholder="Email" class="w-full border p-2 mb-4 rounded focus:outline-[#082465]">
      <input type="password" id="login-pass" placeholder="Password" class="w-full border p-2 mb-6 rounded focus:outline-[#082465]">
      <button onclick="handleLogin()" class="w-full bg-[#082465] text-white py-2 rounded font-bold hover:bg-blue-900 transition">LOGIN</button>
      <p id="login-error" class="text-red-500 text-xs mt-3 text-center"></p>
    </div>
  </div>

  <div id="admin-dashboard" class="hidden container mx-auto py-10 px-4">
    <div class="flex justify-between items-center mb-8 bg-[#082465] p-4 rounded-lg shadow-lg text-white">
      <h2 class="text-xl font-bold">KUJA CONTENT MANAGER</h2>
      <button onclick="handleLogout()" class="bg-red-500 px-4 py-1 rounded text-sm font-bold">LOGOUT</button>
    </div>

    <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-lg border-t-8 border-[#fcc334] p-8">
      <form id="contentForm" class="space-y-5">
        
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">Select Category</label>
          <select id="category" class="w-full border-2 p-2 rounded-lg focus:border-[#082465] outline-none">
            <option value="notices">Notice Board</option>
            <option value="news">Published News/Articles</option>
            <option value="people">Honor Board / Members</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">Subject / Name / Title</label>
          <input type="text" id="title" class="w-full border-2 p-2 rounded-lg outline-none focus:border-[#082465]" required>
        </div>

        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">Upload Image</label>
          <input type="file" id="image" class="w-full text-sm" accept="image/*" required>
        </div>

        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">Link (Optional)</label>
          <input type="url" id="details" class="w-full border-2 p-2 rounded-lg outline-none focus:border-[#082465]" placeholder="https://...">
        </div>

        <button type="submit" id="submitBtn" class="w-full bg-[#082465] text-white font-bold py-3 rounded-lg hover:bg-opacity-90 transition">
          PUBLISH CONTENT
        </button>
        <p id="status" class="text-center font-medium mt-4"></p>
      </form>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBMMbqW-hZEAGFbLgCkLkwD7-KDR3976lg",
        authDomain: "kuja-web.firebaseapp.com",
        projectId: "kuja-web",
        storageBucket: "kuja-web.firebasestorage.app",
        messagingSenderId: "66586196424",
        appId: "1:66586196424:web:d018284928f5e0021068fd"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Login Function
    window.handleLogin = () => {
      const email = document.getElementById('login-email').value;
      const pass = document.getElementById('login-pass').value;
      signInWithEmailAndPassword(auth, email, pass)
        .catch(err => document.getElementById('login-error').innerText = "Invalid Login!");
    };

    // Logout Function
    window.handleLogout = () => signOut(auth);

    // Auth State Observer (Check if logged in)
    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('admin-dashboard').classList.remove('hidden');
      } else {
        document.getElementById('login-screen').classList.remove('hidden');
        document.getElementById('admin-dashboard').classList.add('hidden');
      }
    });

    // Form Submit (Data Upload)
    const form = document.getElementById('contentForm');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const status = document.getElementById('status');
      const btn = document.getElementById('submitBtn');
      
      btn.disabled = true;
      status.innerText = "Uploading to ImgBB...";
      status.className = "text-center text-blue-600";

      const category = document.getElementById('category').value;
      const title = document.getElementById('title').value;
      const details = document.getElementById('details').value;
      const imageFile = document.getElementById('image').files[0];

      const formData = new FormData();
      formData.append("image", imageFile);

      try {
        // 1. Upload to ImgBB
        const imgResponse = await fetch("https://api.imgbb.com/1/upload?key=YOUR_IMGBB_API_KEY", {
          method: "POST",
          body: formData
        });
        const imgData = await imgResponse.json();
        const imageUrl = imgData.data.url;

        // 2. Save to Firebase Database based on selected category
        await addDoc(collection(db, category), {
          subject: title,
          img: imageUrl,
          link: details || "#",
          createdAt: serverTimestamp()
        });

        status.innerText = "Published Successfully in " + category + "!";
        status.className = "text-center text-green-600";
        form.reset();
      } catch (error) {
        status.innerText = "Error: " + error.message;
        status.className = "text-center text-red-600";
      }
      btn.disabled = false;
    });
  </script>
</body>
</html>
