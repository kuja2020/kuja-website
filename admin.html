<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUJA Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <div id="login-screen" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-sm border-t-4 border-[#082465]">
            <h2 class="text-2xl font-bold text-[#082465] text-center mb-6 uppercase tracking-wider">KUJA Login</h2>
            <input type="email" id="login-email" placeholder="Email" class="w-full border p-2 mb-4 rounded shadow-sm outline-none focus:border-[#082465]">
            <input type="password" id="login-pass" placeholder="Password" class="w-full border p-2 mb-6 rounded shadow-sm outline-none focus:border-[#082465]">
            <button onclick="handleLogin()" class="w-full bg-[#082465] text-white py-2 rounded font-bold hover:bg-blue-900 transition duration-300">LOGIN</button>
            <p id="login-error" class="text-red-500 text-xs mt-3 text-center font-bold"></p>
        </div>
    </div>

    <div id="admin-dashboard" class="hidden container mx-auto py-8 px-4">
        <div class="flex justify-between items-center mb-6 bg-[#082465] p-4 rounded-lg text-white shadow-lg">
            <h2 class="text-lg font-bold uppercase tracking-wide">KUJA Web Management Hub</h2>
            <button onclick="handleLogout()" class="bg-red-500 hover:bg-red-700 px-4 py-1 rounded text-sm font-bold transition">LOGOUT</button>
        </div>

        <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-md border-t-4 border-[#fcc334] p-6 mb-10">
            <h3 class="text-lg font-bold mb-4 text-[#082465] border-b pb-2"><i class="fa fa-plus-circle mr-2"></i>Add New Content</h3>
            <form id="contentForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Category</label>
                    <select id="category" onchange="toggleFields()" class="w-full border p-2 rounded bg-gray-50 outline-none focus:border-[#082465]">
                        <option value="notices">Notice Board</option>
                        <option value="people">Committee Member</option>
                    </select>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Subject / Name</label>
                        <input type="text" id="title" class="w-full border p-2 rounded focus:border-[#082465] outline-none" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Link / URL (Optional)</label>
                        <input type="url" id="details" class="w-full border p-2 rounded focus:border-[#082465] outline-none" placeholder="https://...">
                    </div>
                </div>

                <div id="notice-fields">
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Notice Date</label>
                    <input type="date" id="notice-date" class="w-full border p-2 rounded focus:border-[#082465] outline-none bg-white">
                </div>

                <div id="member-fields" class="hidden grid grid-cols-1 md:grid-cols-2 gap-4 p-4 bg-blue-50 rounded-lg border border-blue-100">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Designation</label>
                        <select id="status" class="w-full border p-2 rounded outline-none bg-white focus:border-[#082465]">
                            <option value="President">President</option>
                            <option value="General Secretary">General Secretary</option>
                            <option value="Vice President">Vice President</option>
                            <option value="Joint General Secretary">Joint General Secretary</option>
                            <option value="Treasurer">Treasurer</option>
                            <option value="Organizing Secretary">Organizing Secretary</option>
                            <option value="Office Secretary">Office Secretary</option>
                            <option value="Secretary of Publicity & Publication">Secretary of Publicity & Publication</option>
                            <option value="Executive Member">Executive Member</option>
                            <option value="General Member">General Member</option>
                            <option value="Associate Member">Associate Member</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Discipline & Batch</label>
                        <input type="text" id="discipline" placeholder="e.g. MCJ 20" class="w-full border p-2 rounded outline-none focus:border-[#082465]">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">House Name</label>
                    <input type="text" id="newspaper" placeholder="Newspaper Name (e.g. Kaler Kantha)" class="w-full border p-2 rounded outline-none focus:border-[#082465]">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Phone Number</label>
                        <input type="text" id="phone" placeholder="017..." class="w-full border p-2 rounded outline-none focus:border-[#082465]">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Email Address</label>
                        <input type="email" id="email" placeholder="example@gmail.com" class="w-full border p-2 rounded outline-none focus:border-[#082465]">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Upload Image (Optional)</label>
                    <input type="file" id="image" class="w-full border p-2 rounded bg-gray-50" accept="image/*">
                </div>
                <button type="submit" id="submitBtn" class="w-full bg-[#082465] text-white font-bold py-3 rounded-lg hover:bg-[#fcc334] hover:text-[#082465] transition duration-300">
                    PUBLISH NOW
                </button>
                <p id="statusMsg" class="text-center text-sm font-bold mt-2"></p>
            </form>
        </div>
        <div id="super-admin-section" class="hidden max-w-4xl mx-auto bg-white rounded-xl shadow-md border-t-4 border-red-500 p-6">
            <h3 class="text-lg font-bold mb-4 text-red-600 border-b pb-2"><i class="fa fa-trash mr-2"></i>Manage Content</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-100 text-xs uppercase text-gray-600">
                            <th class="p-3 border">Title / Name</th>
                            <th class="p-3 border">Category</th>
                            <th class="p-3 border text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody id="manage-list" class="text-sm"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, addDoc, collection, serverTimestamp, query, orderBy, onSnapshot, doc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBMMbqW-hZEAGFbLgCkLkwD7-KDR3976lg",
            authDomain: "kuja-web.firebaseapp.com",
            projectId: "kuja-web",
            storageBucket: "kuja-web.firebasestorage.app",
            messagingSenderId: "66586196424",
            appId: "1:66586196424:web:d018284928f5e0021068fd"
        };

        const IMGBB_KEY = "4ce47b896218489099e0f7b7acf5c023";
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const adminDoc = await getDoc(doc(db, "admins", user.email));
                if (adminDoc.exists()) {
                    setupUIByRole(adminDoc.data().role);
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('admin-dashboard').classList.remove('hidden');
                } else {
                    alert("Unauthorized Access!");
                    signOut(auth);
                }
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('admin-dashboard').classList.add('hidden');
            }
        });

        function setupUIByRole(role) {
            const catSelect = document.getElementById('category');
            const superSec = document.getElementById('super-admin-section');
            if (role === 'super_admin') {
                catSelect.innerHTML = '<option value="notices">Notice Board</option><option value="people">Committee Member</option>';
                superSec.classList.remove('hidden');
                loadManager();
            } else if (role === 'editor_admin') {
                catSelect.innerHTML = '<option value="notices">Notice Board</option><option value="people">Committee Member</option>';
                superSec.classList.add('hidden');
            } else if (role === 'only_notice') {
                catSelect.innerHTML = '<option value="notices">Notice Board</option>';
                superSec.classList.add('hidden');
            } else if (role === 'only_member') {
                catSelect.innerHTML = '<option value="people">Committee Member</option>';
                superSec.classList.add('hidden');
            }
            toggleFields();
        }

        window.toggleFields = () => {
            const cat = document.getElementById('category').value;
            document.getElementById('member-fields').classList.toggle('hidden', cat !== 'people');
            document.getElementById('notice-fields').classList.toggle('hidden', cat !== 'notices');
        };

        window.handleLogin = () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            signInWithEmailAndPassword(auth, email, pass).catch(err => {
                document.getElementById('login-error').innerText = "Login Failed: " + err.message;
            });
        };

        window.handleLogout = () => signOut(auth);

        const form = document.getElementById('contentForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const msg = document.getElementById('statusMsg');
            btn.disabled = true; msg.innerText = "Processing...";
            
            const cat = document.getElementById('category').value;
            const imageFile = document.getElementById('image').files[0];
            let imageUrl = "";

            try {
                if (imageFile) {
                    msg.innerText = "Uploading Image...";
                    const formData = new FormData();
                    formData.append("image", imageFile);
                    const imgRes = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {method: "POST", body: formData});
                    const imgData = await imgRes.json();
                    if(imgData.success) imageUrl = imgData.data.url;
                }

                const today = new Date().toISOString().split('T')[0];
                const selectedDate = document.getElementById('notice-date').value;

                await addDoc(collection(db, cat), {
                    subject: document.getElementById('title').value,
                    img: imageUrl,
                    link: document.getElementById('details').value || "#",
                    date: cat === 'notices' ? (selectedDate || today) : "",
                    status: cat === 'people' ? document.getElementById('status').value : "",
                    discipline: document.getElementById('discipline').value || "",
                    phone: document.getElementById('phone').value || "",
                    email: document.getElementById('email').value || "",
                    createdAt: serverTimestamp()
                });

                msg.innerHTML = "<span class='text-green-600 font-bold'>✓ Published!</span>";
                form.reset(); toggleFields();
            } catch (err) { msg.innerHTML = "<span class='text-red-600'>Error: " + err.message + "</span>"; }
            btn.disabled = false;
        });

        function loadManager() {
            const list = document.getElementById('manage-list');
            list.innerHTML = "";
            ['notices', 'people'].forEach(cat => {
                onSnapshot(query(collection(db, cat), orderBy("createdAt", "desc")), (snaps) => {
                    snaps.docChanges().forEach(change => {
                        const id = change.doc.id;
                        if (change.type === "added" && !document.getElementById(`row-${id}`)) {
                            const tr = document.createElement('tr');
                            tr.id = `row-${id}`;
                            tr.className = "border-b hover:bg-gray-50";
                            tr.innerHTML = `<td class="p-3">${change.doc.data().subject}</td><td class="p-3 uppercase text-xs font-bold">${cat}</td>
                                <td class="p-3 text-center"><button onclick="del('${cat}','${id}')" class="text-red-600 font-bold text-xs hover:underline">DELETE</button></td>`;
                            list.appendChild(tr);
                        }
                        if (change.type === "removed") document.getElementById(`row-${id}`)?.remove();
                    });
                });
            });
        }

        window.del = async (cat, id) => { if(confirm("Are you sure?")) await deleteDoc(doc(db, cat, id)); };
    </script>
</body>
</html>
