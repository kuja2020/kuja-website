<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUJA Kuakata Tour 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:400,700,900&display=swap');
        body { background-color: #082465; color: white; font-family: 'Poppins', sans-serif; overflow-x: hidden; }

        /* Floating Menu Icon */
        #floating-menu { position: fixed; top: 15px; left: 15px; z-index: 1000; display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.5); padding: 5px 12px; border-radius: 30px; border: 1px solid #fcc334; }
        #menu-icon { width: 22px; height: 22px; }
        #three-dots { color: #fcc334; font-size: 18px; cursor: pointer; }
        #main-menu { position: fixed; top: 60px; left: 15px; background: #082465; border: 2px solid #fcc334; border-radius: 12px; padding: 10px; display: none; z-index: 1001; min-width: 150px; }
        #main-menu a { display: block; padding: 8px 15px; color: white; text-decoration: none; font-size: 13px; font-weight: bold; }
        #main-menu a:hover { background: #fcc334; color: #082465; border-radius: 8px; }

        /* Main Full Screen Slider */
        .hero-slider { width: 100%; height: 75vh; }
        @media (min-width: 768px) { .hero-slider { height: 100vh; } }
        .hero-slider img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.5); }

        /* Fixed Upper Content */
        .hero-overlay { position: absolute; top: 15%; left: 0; width: 100%; z-index: 500; text-align: center; pointer-events: none; }
        .main-title { font-size: clamp(2rem, 8vw, 4.5rem); color: #fcc334; font-weight: 900; text-transform: uppercase; text-shadow: 3px 3px 0px white; }

        /* Compact Glass Countdown Box */
        .glass-timer-card { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.2); padding: 15px; border-radius: 25px; position: absolute; bottom: 8%; width: 90%; max-width: 600px; z-index: 500; left: 50%; transform: translateX(-50%); }
        .timer-val { font-size: clamp(1.8rem, 6vw, 3.5rem); font-weight: 900; line-height: 1; }

        /* Delegate Slider */
        .delegate-swiper { width: 100%; padding: 30px 20px; }
        .delegate-card { background: white; border-radius: 20px; padding: 10px; border-bottom: 5px solid #fcc334; text-align: center; transition: 0.3s; color: #082465; }
        .delegate-img-box { width: 100%; height: 170px; overflow: hidden; border-radius: 15px; margin-bottom: 10px; }
        .delegate-img-box img { width: 100%; height: 100%; object-fit: cover; }

        /* ID Card Popup */
        #id-card-popup { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
        #id-card-content { background: white; color: #082465; width: 340px; border-radius: 25px; overflow: hidden; text-align: center; border: 2px solid #fcc334; }
        #id-header { background: #082465; padding: 20px; border-bottom: 5px solid #fcc334; color: white; }
    </style>
</head>
<body>

    <div id="floating-menu">
        <img src="images/logo.png" id="menu-icon" onerror="this.src='https://via.placeholder.com/25'">
        <i class="fa fa-ellipsis-v" id="three-dots"></i>
    </div>
    <div id="main-menu">
        <a href="index.html">Home</a>
        <a href="people.html">People</a>
        <a href="notices.html">Notices</a>
        <a href="contact.html">Contact</a>
    </div>

    <div class="hero-overlay">
        <h2 class="text-[10px] md:text-sm tracking-[5px] uppercase font-bold text-white mb-1">THE SEA QUEEN CALLS</h2>
        <h1 class="main-title">KUJA Expedition</h1>
        <p class="text-[10px] md:text-xs tracking-widest text-gray-200">Journey to the Sunrise and Sunset Beach</p>
    </div>

    <div class="swiper hero-slider">
        <div class="swiper-wrapper">
            <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1544731612-de7f96afe55f?q=80&w=2000"></div>
            <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1590001155093-a3c66ab0c3ff?q=80&w=2000"></div>
            <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1583267746897-2cf415888172?q=80&w=2000"></div>
        </div>

        <div class="glass-timer-card">
            <div id="countdown" class="flex justify-center items-center gap-4 md:gap-8 font-black">
                <div class="text-[#fcc334] text-center"><span id="days" class="timer-val">00</span><p class="text-[10px] uppercase text-white">Days</p></div>
                <span class="timer-val text-white mb-4">:</span>
                <div class="text-white text-center"><span id="hours" class="timer-val">00</span><p class="text-[10px] uppercase">Hrs</p></div>
                <span class="timer-val text-white mb-4">:</span>
                <div class="text-[#fcc334] text-center"><span id="mins" class="timer-val">00</span><p class="text-[10px] uppercase text-white">Min</p></div>
                <span class="timer-val text-white mb-4">:</span>
                <div class="text-red-500 text-center"><span id="secs" class="timer-val">00</span><p class="text-[10px] uppercase text-white">Sec</p></div>
            </div>
        </div>
    </div>

    <section class="py-12 px-4">
        <h2 class="text-3xl font-black text-center mb-6 text-[#fcc334] italic uppercase tracking-wider">Tour Delegates</h2>
        <div class="swiper delegate-swiper">
            <div class="swiper-wrapper" id="delegate-list">
                </div>
        </div>
    </section>

    <section class="py-12 text-center bg-[#fcc334] text-[#082465]">
        <h3 class="text-2xl font-black mb-4">GENERATE YOUR TOUR ID CARD</h3>
        <button id="generate-id-btn" class="bg-[#082465] text-white px-10 py-4 rounded-full font-bold shadow-2xl transition hover:scale-105 active:scale-95">CLICK TO GENERATE</button>
    </section>

    <section class="py-12 container mx-auto px-4">
        <h2 class="text-2xl font-black text-center mb-8 text-[#fcc334] uppercase">Kuakata Moments</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <img src="https://images.unsplash.com/photo-1583267746897-2cf415888172?q=80&w=600" class="rounded-2xl h-48 w-full object-cover">
            <img src="https://images.unsplash.com/photo-1590001155093-a3c66ab0c3ff?q=80&w=600" class="rounded-2xl h-48 w-full object-cover">
            <img src="https://images.unsplash.com/photo-1544731612-de7f96afe55f?q=80&w=600" class="rounded-2xl h-48 w-full object-cover">
            <img src="https://images.unsplash.com/photo-1621258673752-92f3922f37c4?q=80&w=600" class="rounded-2xl h-48 w-full object-cover">
        </div>
    </section>

    <div id="id-card-popup">
        <div class="p-4">
            <div id="id-card-content" class="shadow-2xl bg-white">
                <div id="id-header">
                    <img src="images/logo.png" class="h-10 mx-auto mb-2">
                    <h4 class="text-sm font-black tracking-widest">KUAKATA EXPEDITION 2026</h4>
                    <p class="text-[9px] uppercase opacity-80">Official Delegate</p>
                </div>
                <div class="p-8">
                    <div class="w-28 h-28 rounded-full border-4 border-[#fcc334] overflow-hidden mx-auto mb-4 shadow-lg">
                        <img id="card-img" src="" class="w-full h-full object-cover">
                    </div>
                    <h3 id="card-name" class="font-black text-xl uppercase tracking-tighter text-[#082465]">NAME</h3>
                    <p id="card-status" class="text-xs font-bold text-yellow-600 mb-1">STATUS</p>
                    <p id="card-newspaper" class="text-[10px] text-gray-500 italic">NEWSPAPER</p>
                </div>
            </div>
            <div class="mt-6 flex gap-4 justify-center">
                <button id="download-btn" class="bg-[#fcc334] text-[#082465] px-6 py-2 rounded-full font-bold">Download Image</button>
                <button id="close-btn" class="bg-white text-black px-6 py-2 rounded-full font-bold">Close</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBMMbqW-hZEAGFbLgCkLkwD7-KDR3976lg",
            authDomain: "kuja-web.firebaseapp.com",
            projectId: "kuja-web",
            storageBucket: "kuja-web.firebasestorage.app",
            messagingSenderId: "66586196424",
            appId: "1:66586196424:web:d018284928f5e0021068fd"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- 1. Three Dot Menu ---
        const dot = document.getElementById('three-dots');
        const menu = document.getElementById('main-menu');
        dot.addEventListener('click', (e) => {
            e.stopPropagation();
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        });
        document.addEventListener('click', () => menu.style.display = 'none');

        // --- 2. Main Photo Slider (FIXED) ---
        new Swiper(".hero-slider", {
            loop: true,
            autoplay: { delay: 1800, disableOnInteraction: false },
            effect: 'fade',
            fadeEffect: { crossFade: true },
            speed: 800
        });

        // --- 3. Delegate Logic (FIXED Firebase + Former Logic) ---
        const rankPriority = { "President": 1, "General Secretary": 2, "Vice President": 3, "Joint General Secretary": 4, "Treasurer": 5, "Organizing Secretary": 6, "Office Secretary": 7, "Secretary of Publicity & Publication": 8, "Executive Member": 9, "General Member": 10 };
        const dList = document.getElementById('delegate-list');
        let currentDelegate = null;

        onSnapshot(collection(db, "people"), (snap) => {
            let dataArr = [];
            snap.forEach(d => dataArr.push(d.data()));
            dataArr.sort((a,b) => (rankPriority[a.status] || 99) - (rankPriority[b.status] || 99));

            const formers = [
                { subject: "Rezowan Ahmmed", status: "Former President", img: "images/rezowan.jpg", newspaper: "The Daily Star" },
                { subject: "Ekramul Haque", status: "Former President", img: "images/ekramul.jpg", newspaper: "Daily Sun" }
            ];

            const finalData = [...formers, ...dataArr];
            currentDelegate = finalData[0]; // জেনারেটরের জন্য ডিফল্ট প্রথমজন

            dList.innerHTML = "";
            finalData.forEach(m => {
                dList.innerHTML += `
                <div class="swiper-slide w-auto">
                    <div class="delegate-card w-40 md:w-52 h-full shadow-lg">
                        <div class="delegate-img-box"><img src="${m.img}" onerror="this.src='https://via.placeholder.com/150'"></div>
                        <h4 class="text-[13px] font-black">${m.subject}</h4>
                        <p class="text-[10px] text-yellow-600 font-bold uppercase">${m.status}</p>
                    </div>
                </div>`;
            });

            new Swiper(".delegate-swiper", {
                slidesPerView: "auto",
                spaceBetween: 15,
                freeMode: true
            });
        });

        // --- 4. Card Generator (FIXED) ---
        document.getElementById('generate-id-btn').onclick = () => {
            if(!currentDelegate) return;
            document.getElementById('card-img').src = currentDelegate.img;
            document.getElementById('card-name').innerText = currentDelegate.subject;
            document.getElementById('card-status').innerText = currentDelegate.status;
            document.getElementById('card-newspaper').innerText = currentDelegate.newspaper || "";
            document.getElementById('id-card-popup').style.display = 'flex';
        };

        document.getElementById('close-btn').onclick = () => document.getElementById('id-card-popup').style.display = 'none';

        document.getElementById('download-btn').onclick = () => {
            const btn = document.getElementById('download-btn');
            btn.innerText = "Processing...";
            html2canvas(document.getElementById('id-card-content'), { useCORS: true, scale: 2 }).then(canvas => {
                const a = document.createElement('a');
                a.href = canvas.toDataURL("image/png");
                a.download = `KUJA_Tour_ID_${currentDelegate.subject}.png`;
                a.click();
                btn.innerText = "Download Image";
            });
        };

        // --- 5. Countdown ---
        const targetTime = new Date("April 23, 2026 00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = targetTime - now;
            document.getElementById('days').innerText = Math.floor(diff / 86400000);
            document.getElementById('hours').innerText = Math.floor((diff % 86400000) / 3600000);
            document.getElementById('mins').innerText = Math.floor((diff % 3600000) / 60000);
            document.getElementById('secs').innerText = Math.floor((diff % 60000) / 1000);
        }, 1000);
    </script>
</body>
</html>
