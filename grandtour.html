<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUJA Kuakata Tour 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:400,700,900&display=swap');

        body { background-color: #082465; color: white; font-family: 'Poppins', sans-serif; overflow-x: hidden; }

        /* Full Screen Slider */
        .swiper { width: 100%; height: 70vh; }
        @media (min-width: 768px) { .swiper { height: 100vh; } }

        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.4);
        }

        /* Fixed Upper Content */
        .hero-text-section {
            position: absolute;
            top: 8%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            text-align: center;
            width: 100%;
        }

        .main-title {
            font-size: clamp(1.8rem, 6vw, 4rem);
            color: #fcc334;
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: 2px 2px 0px white;
        }

        /* Compact Glass Countdown Box */
        .glass-timer-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 20px;
            position: absolute;
            bottom: 5%;
            width: 90%;
            max-width: 600px;
            z-index: 100;
            left: 50%;
            transform: translateX(-50%);
        }

        .timer-val { font-size: clamp(1.5rem, 5vw, 3rem); font-weight: 900; }
        .timer-box { text-align: center; }

        /* Jikjak Glass Delegate Card */
        .delegate-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 10px;
            transition: 0.4s;
            border-top: 4px solid #fcc334;
        }
        .delegate-card:hover { 
            transform: scale(1.05) rotate(2deg); 
            background: rgba(255, 255, 255, 0.15);
        }
        .delegate-img-container { height: 180px; overflow: hidden; border-radius: 15px; }
        .delegate-img-container img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div class="hero-text-section">
        <h2 class="text-[10px] md:text-sm tracking-[5px] uppercase font-bold text-white mb-1">THE SEA QUEEN CALLS</h2>
        <h1 class="main-title">KUJA Expedition</h1>
        <p class="text-[10px] md:text-xs tracking-widest text-gray-200">Journey to the Sunrise and Sunset Beach</p>
    </div>

    <div class="swiper mySwiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1544731612-de7f96afe55f?q=80&w=2000"></div>
            <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1590001155093-a3c66ab0c3ff?q=80&w=2000"></div>
            <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1583267746897-2cf415888172?q=80&w=2000"></div>
        </div>

        <div class="glass-timer-card">
            <div id="countdown" class="flex justify-center items-center gap-4 md:gap-8 font-black">
                <div class="timer-box text-[#fcc334]"><span id="days" class="timer-val">00</span><p class="text-[9px] uppercase text-white">Days</p></div>
                <span class="timer-val text-white mb-2">:</span>
                <div class="timer-box text-white"><span id="hours" class="timer-val">00</span><p class="text-[9px] uppercase">Hrs</p></div>
                <span class="timer-val text-white mb-2">:</span>
                <div class="timer-box text-[#fcc334]"><span id="mins" class="timer-val">00</span><p class="text-[9px] uppercase text-white">Min</p></div>
                <span class="timer-val text-white mb-2">:</span>
                <div class="timer-box text-red-500"><span id="secs" class="timer-val">00</span><p class="text-[9px] uppercase text-white">Sec</p></div>
            </div>
        </div>
    </div>

    <section class="py-16 container mx-auto px-4">
        <h2 class="text-3xl font-black text-center mb-10 italic text-[#fcc334] uppercase tracking-wider">Tour Delegates</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 max-w-6xl mx-auto" id="delegate-list">
            </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBMMbqW-hZEAGFbLgCkLkwD7-KDR3976lg",
            authDomain: "kuja-web.firebaseapp.com",
            projectId: "kuja-web",
            storageBucket: "kuja-web.firebasestorage.app",
            messagingSenderId: "66586196424",
            appId: "1:66586196424:web:d018284928f5e0021068fd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- Fast Slider Config (Speed Increased) ---
        var swiper = new Swiper(".mySwiper", {
            loop: true,
            autoplay: { delay: 1800, disableOnInteraction: false }, // গতি বাড়ানো হয়েছে
            speed: 800,
            effect: "slide",
        });

        // --- Rank Priority (সিরিয়াল মেইনটেইন) ---
        const rankPriority = {
            "President": 1,
            "General Secretary": 2,
            "Vice President": 3,
            "Joint General Secretary": 4,
            "Treasurer": 5,
            "Organizing Secretary": 6,
            "Office Secretary": 7,
            "Secretary of Publicity & Publication": 8,
            "Executive Member": 9,
            "General Member": 10,
            "Associate Member": 11
        };

        // --- Firebase Load ---
        const delegateList = document.getElementById('delegate-list');
        onSnapshot(collection(db, "people"), (snapshot) => {
            let membersArr = [];
            
            // ১. প্রাক্তন প্রেসিডেন্টদের ম্যানুয়ালি শুরুতে যোগ করা
            const formers = [
                { subject: "Rezowan Ahmmed", status: "Former President", img: "images/rezowan.jpg", newspaper: "The Daily Star" },
                { subject: "Ekramul Haque", status: "Former President", img: "images/ekramul.jpg", newspaper: "Daily Sun" }
            ];

            snapshot.forEach((doc) => {
                membersArr.push(doc.data());
            });

            // ২. সিরিয়াল অনুযায়ী সর্টিং
            membersArr.sort((a, b) => (rankPriority[a.status] || 99) - (rankPriority[b.status] || 99));

            // ৩. প্রাক্তন প্রেসিডেন্টদের সবার আগে ইনসার্ট করা
            const finalDisplayList = [...formers, ...membersArr];

            delegateList.innerHTML = "";
            finalDisplayList.forEach((m) => {
                delegateList.innerHTML += `
                    <div class="delegate-card shadow-2xl">
                        <div class="delegate-img-container">
                            <img src="${m.img}" onerror="this.src='images/logo.png'">
                        </div>
                        <div class="p-3 text-center">
                            <h4 class="text-white font-bold text-[13px] mb-1">${m.subject}</h4>
                            <p class="text-[#fcc334] font-bold text-[10px] uppercase mb-1">${m.status}</p>
                            <p class="text-gray-400 text-[9px] font-bold italic">${m.newspaper || ''}</p>
                        </div>
                    </div>
                `;
            });
        });

        // --- Countdown ---
        const target = new Date("April 23, 2026 00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = target - now;
            document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('hours').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById('mins').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById('secs').innerText = Math.floor((diff % (1000 * 60)) / 1000);
        }, 1000);
    </script>
</body>
</html>
