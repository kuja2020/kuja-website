<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUJA Kuakata Tour | Ultra Slider</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:900&display=swap');

        body {
            background-color: #082465;
            color: white;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }

        /* Full Screen Slider */
        .swiper {
            width: 100%;
            height: 100vh;
        }

        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.4);
            /* দ্রুত পরিবর্তনের জন্য এনিমেশন */
            animation: zoomInFast 3s infinite alternate; 
        }

        @keyframes zoomInFast {
            0% { transform: scale(1) rotate(0deg); }
            100% { transform: scale(1.15) rotate(2deg); }
        }

        /* Upper Text Design */
        .upper-content {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            text-align: center;
            width: 100%;
        }

        .main-title {
            font-size: clamp(2.5rem, 8vw, 6rem);
            color: #fcc334;
            text-transform: uppercase;
            letter-spacing: -2px;
            line-height: 1;
            text-shadow: 4px 4px 0px #fff;
        }

        .sub-title {
            font-size: 1.2rem;
            letter-spacing: 5px;
            color: white;
            margin-top: 10px;
            font-weight: bold;
        }

        /* Zigzag Countdown Box (আগের মতো) */
        .timer-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            position: absolute;
            bottom: 15%;
            width: 100%;
            z-index: 50;
        }

        .timer-box {
            background: #fcc334;
            color: #082465;
            padding: 20px;
            border-radius: 15px;
            min-width: 100px;
            transform: rotate(-7deg); /* জিকজ্যাক অ্যাঙ্গেল */
            box-shadow: 8px 8px 0px white;
            text-align: center;
        }

        .timer-box:nth-child(even) {
            transform: rotate(7deg);
            background: white;
            box-shadow: 8px 8px 0px #fcc334;
        }

        /* Jikjak Delegate Grid */
        .delegate-grid div:nth-child(even) {
            margin-top: 60px;
            transform: rotate(4deg);
        }
        .delegate-grid div:nth-child(odd) {
            transform: rotate(-4deg);
        }
    </style>
</head>
<body>

    <div class="upper-content">
        <h2 class="sub-title animate__animated animate__fadeInDown">THE SEA QUEEN CALLS</h2>
        <h1 class="main-title animate__animated animate__rubberBand">KUAKATA 2026</h1>
        <p class="sub-title text-sm mt-2 opacity-80">Journey to the Sunrise and Sunset Beach</p>
    </div>

    <div class="swiper mySwiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1544731612-de7f96afe55f?q=80&w=2000"></div>
            <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1590001155093-a3c66ab0c3ff?q=80&w=2000"></div>
            <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1583267746897-2cf415888172?q=80&w=2000"></div>
            <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1590001155093-a3c66ab0c3ff?q=80&w=2000"></div>
        </div>

        <div class="timer-container">
            <div class="timer-box"><span id="days" class="text-4xl font-black">00</span><p class="text-xs font-bold">DAYS</p></div>
            <div class="timer-box"><span id="hours" class="text-4xl font-black">00</span><p class="text-xs font-bold">HOURS</p></div>
            <div class="timer-box"><span id="mins" class="text-4xl font-black">00</span><p class="text-xs font-bold">MINS</p></div>
            <div class="timer-box"><span id="secs" class="text-4xl font-black">00</span><p class="text-xs font-bold">SECS</p></div>
        </div>
    </div>

    <section class="py-24 container mx-auto px-6">
        <h2 class="text-5xl font-black text-center mb-24 italic text-[#fcc334]">TOUR DELEGATES</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-10 delegate-grid">
            <div class="bg-white p-2 rounded-2xl shadow-2xl">
                <img src="Profile/images/advisor/1.jpg" class="h-64 w-full object-cover rounded-xl">
                <p class="text-[#082465] font-black text-center mt-3 uppercase text-sm">Romin Al Kama</p>
            </div>
            <div class="bg-white p-2 rounded-2xl shadow-2xl">
                <img src="Profile/images/advisor/2.jpg" class="h-64 w-full object-cover rounded-xl">
                <p class="text-[#082465] font-black text-center mt-3 uppercase text-sm">Masum Hasan</p>
            </div>
            <div class="bg-white p-2 rounded-2xl shadow-2xl">
                <img src="Profile/images/advisor/3.jpg" class="h-64 w-full object-cover rounded-xl">
                <p class="text-[#082465] font-black text-center mt-3 uppercase text-sm">Mirazul Islam</p>
            </div>
            <div class="bg-white p-2 rounded-2xl shadow-2xl">
                <img src="Profile/images/advisor/4.jpg" class="h-64 w-full object-cover rounded-xl">
                <p class="text-[#082465] font-black text-center mt-3 uppercase text-sm">Arko Mondol</p>
            </div>
        </div>
    </section>

    <div class="py-20 text-center">
        <button class="bg-[#fcc334] text-[#082465] text-4xl font-black px-16 py-6 rounded-full hover:scale-110 transition shadow-[0_0_50px_rgba(252,195,52,0.6)]">
            JOIN THE JOKJAK!
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        // Fast Slider Init
        var swiper = new Swiper(".mySwiper", {
            loop: true,
            autoplay: {
                delay: 2500, // আরও দ্রুত পরিবর্তনের জন্য ২.৫ সেকেন্ড দেওয়া হয়েছে
                disableOnInteraction: false,
            },
            effect: "fade",
            fadeEffect: { crossFade: true },
            speed: 800,
        });

        // Countdown Logic (Target: 23rd April 2026)
        const targetDate = new Date("April 23, 2026 00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = targetDate - now;
            
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('days').innerText = d < 0 ? "00" : (d < 10 ? "0" + d : d);
            document.getElementById('hours').innerText = h < 0 ? "00" : (h < 10 ? "0" + h : h);
            document.getElementById('mins').innerText = m < 0 ? "00" : (m < 10 ? "0" + m : m);
            document.getElementById('secs').innerText = s < 0 ? "00" : (s < 10 ? "0" + s : s);
        }, 1000);
    </script>
</body>
</html>
