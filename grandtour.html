<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUJA Kuakata Tour 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:400,700,900&display=swap');

        body { background-color: #082465; color: white; font-family: 'Poppins', sans-serif; overflow-x: hidden; }

        /* Full Screen Slider */
        .swiper { width: 100%; height: 70vh; } /* Mobile এ উচ্চতা কিছুটা কমানো যাতে ল্যান্ডস্কেপ ভাব থাকে */
        @media (min-width: 768px) { .swiper { height: 100vh; } }

        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* ইমেজ ল্যান্ডস্কেপ মোডে সুন্দর দেখাবে */
            filter: brightness(0.5);
        }

        /* Fixed Upper Content */
        .hero-text-section {
            position: absolute;
            top: 8%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            text-align: center;
            width: 100%;
        }

        .main-title {
            font-size: clamp(1.8rem, 6vw, 4rem);
            color: #fcc334;
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: 2px 2px 0px white;
        }

        /* Glass Countdown Box (First Style) */
        .glass-timer-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 20px;
            position: absolute;
            bottom: 5%;
            width: 90%;
            max-width: 650px;
            z-index: 100;
            left: 50%;
            transform: translateX(-50%);
        }

        .timer-val { font-size: clamp(1.5rem, 5vw, 3.5rem); font-weight: 900; }
        .timer-box { text-align: center; }
        .timer-box:nth-child(odd) { color: #fcc334; }
        .timer-box:nth-child(even) { color: white; }

        /* Delegates Style (Same as Member Page) */
        .delegate-card {
            border-radius: 15px;
            overflow: hidden;
            background: white;
            transition: 0.3s;
            height: 100%;
        }
        .delegate-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .delegate-img-container { height: 180px; overflow: hidden; }
        .delegate-img-container img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div class="hero-text-section">
        <h2 class="text-[10px] md:text-sm tracking-[5px] uppercase font-bold text-white mb-1">THE SEA QUEEN CALLS</h2>
        <h1 class="main-title">KUJA Expedition</h1>
        <p class="text-[10px] md:text-xs tracking-widest text-gray-200">Journey to the Sunrise and Sunset Beach</p>
    </div>

    <div class="swiper mySwiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide"><img src="images/village.jpg?q=80&w=2000"></div>
            <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1590001155093-a3c66ab0c3ff?q=80&w=2000"></div>
            <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1583267746897-2cf415888172?q=80&w=2000"></div>
            <div class="swiper-slide"><img src="images/village.jpg?q=80&w=2000"></div>
            <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1590001155093-a3c66ab0c3ff?q=80&w=2000"></div>
            <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1583267746897-2cf415888172?q=80&w=2000"></div>
        </div>

        <div class="glass-timer-card">
            <h3 class="text-center text-[10px] uppercase tracking-widest text-blue-300 mb-2 font-bold">Countdown to Adventure</h3>
            <div id="countdown" class="flex justify-center items-center gap-4 md:gap-8 font-black">
                <div class="timer-box"><span id="days" class="timer-val">00</span><p class="text-[9px] uppercase">Days</p></div>
                <span class="timer-val text-white mb-4">:</span>
                <div class="timer-box"><span id="hours" class="timer-val">00</span><p class="text-[9px] uppercase">Hrs</p></div>
                <span class="timer-val text-white mb-4">:</span>
                <div class="timer-box"><span id="mins" class="timer-val">00</span><p class="text-[9px] uppercase">Min</p></div>
                <span class="timer-val text-white mb-4">:</span>
                <div class="timer-box text-red-500"><span id="secs" class="timer-val">00</span><p class="text-[9px] uppercase text-white">Sec</p></div>
            </div>
        </div>
    </div>

    <section class="py-16 container mx-auto px-4">
        <h2 class="text-3xl font-black text-center mb-10 italic text-[#fcc334] uppercase tracking-wider">Tour Delegates</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-4 gap-4 md:gap-8 max-w-6xl mx-auto" id="delegate-list">
            </div>
    </section>

    <div class="pb-20 text-center">
        <button class="bg-[#fcc334] text-[#082465] text-xl font-black px-10 py-4 rounded-full shadow-2xl animate-pulse">
            READY TO ROAR?
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBMMbqW-hZEAGFbLgCkLkwD7-KDR3976lg",
            authDomain: "kuja-web.firebaseapp.com",
            projectId: "kuja-web",
            storageBucket: "kuja-web.firebasestorage.app",
            messagingSenderId: "66586196424",
            appId: "1:66586196424:web:d018284928f5e0021068fd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- Slider Config (বাম-ডান স্লাইড) ---
        var swiper = new Swiper(".mySwiper", {
            loop: true,
            autoplay: { delay: 2500, disableOnInteraction: false },
            speed: 1000,
            effect: "slide", // এটি নিশ্চিত করে ফটো বাম বা ডান থেকে আসবে
        });

        // --- Firebase Delegates (Auto Load) ---
        const delegateList = document.getElementById('delegate-list');
        onSnapshot(collection(db, "people"), (snapshot) => {
            delegateList.innerHTML = "";
            let count = 0;
            snapshot.forEach((doc) => {
                if(count < 8) { // ট্যুর পেজে সব মেম্বার না দেখিয়ে প্রথম ৮ জন বা নির্দিষ্টদের জন্য ফিল্টার করতে পারেন
                    const m = doc.data();
                    delegateList.innerHTML += `
                        <div class="delegate-card shadow-lg">
                            <div class="delegate-img-container">
                                <img src="${m.img}">
                            </div>
                            <div class="p-3 text-center">
                                <h4 class="text-[#082465] font-bold text-[13px] mb-1">${m.subject}</h4>
                                <p class="text-warning font-bold text-[10px] uppercase mb-1">${m.status}</p>
                                <p class="text-gray-500 text-[9px] font-bold italic">${m.newspaper || ''}</p>
                            </div>
                        </div>
                    `;
                    count++;
                }
            });
        });

        // --- Countdown Logic ---
        const target = new Date("April 23, 2026 00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = target - now;
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('days').innerText = d < 0 ? "00" : (d < 10 ? "0"+d : d);
            document.getElementById('hours').innerText = h < 0 ? "00" : (h < 10 ? "0"+h : h);
            document.getElementById('mins').innerText = m < 0 ? "00" : (m < 10 ? "0"+m : m);
            document.getElementById('secs').innerText = s < 0 ? "00" : (s < 10 ? "0"+s : s);
        }, 1000);
    </script>
</body>
</html>
