<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUJA Kuakata Tour 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:400,700,900&display=swap');
        body { background-color: #082465; color: white; font-family: 'Poppins', sans-serif; overflow-x: hidden; }

        /* --- Floating Menu (আরো ছোট আইকন) --- */
        #floating-menu { position: fixed; top: 15px; left: 15px; z-index: 999; display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.3); padding: 5px 10px; border-radius: 30px; }
        #menu-icon { width: 25px; height: 25px; cursor: pointer; }
        #three-dots { color: white; font-size: 18px; cursor: pointer; }
        #main-menu { position: fixed; top: 55px; left: 15px; background: #082465; border: 1px solid #fcc334; border-radius: 10px; padding: 10px; display: none; z-index: 1000; }
        #main-menu li a { display: block; padding: 5px 15px; color: white; text-decoration: none; font-size: 13px; }

        /* --- Full Screen Slider --- */
        .swiper-container { width: 100%; height: 75vh; }
        @media (min-width: 768px) { .swiper-container { height: 100vh; } }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); }

        /* Fixed Upper Content */
        .hero-text-section { position: absolute; top: 15%; left: 50%; transform: translateX(-50%); z-index: 100; text-align: center; width: 100%; pointer-events: none; }
        .main-title { font-size: clamp(1.8rem, 6vw, 4rem); color: #fcc334; font-weight: 900; text-transform: uppercase; text-shadow: 2px 2px 0px white; }

        /* Glass Countdown Box */
        .glass-timer-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); padding: 15px; border-radius: 20px; position: absolute; bottom: 5%; width: 90%; max-width: 600px; z-index: 100; left: 50%; transform: translateX(-50%); }
        .timer-val { font-size: clamp(1.5rem, 5vw, 3rem); font-weight: 900; }

        /* --- Horizontal Delegates Slider --- */
        .delegate-swiper { width: 100%; padding: 20px 20px; }
        .delegate-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border-radius: 20px; padding: 10px; border-top: 4px solid #fcc334; text-align: center; height: 100%; }
        .delegate-img-container { width: 100%; height: 160px; overflow: hidden; border-radius: 15px; margin-bottom: 10px; }
        .delegate-img-container img { width: 100%; height: 100%; object-fit: cover; }

        /* --- ID Card Popup --- */
        #id-card-popup { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
        #id-card-content { background: white; color: #082465; width: 320px; border-radius: 20px; overflow: hidden; }
        #id-card-header { background: #082465; color: white; padding: 15px; border-bottom: 4px solid #fcc334; }
    </style>
</head>
<body>

    <div id="floating-menu">
        <img src="images/logo.png" id="menu-icon" onerror="this.src='https://via.placeholder.com/25'">
        <i class="fa fa-ellipsis-v" id="three-dots"></i>
    </div>
    <div id="main-menu">
        <ul class="list-none m-0 p-0">
            <li><a href="index.html">Home</a></li>
            <li><a href="people.html">People</a></li>
            <li><a href="notices.html">Notices</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </div>

    <div class="hero-text-section">
        <h2 class="text-[10px] md:text-sm tracking-[5px] uppercase font-bold text-white mb-1">THE SEA QUEEN CALLS</h2>
        <h1 class="main-title">KUJA Expedition</h1>
        <p class="text-[10px] md:text-xs tracking-widest text-gray-200">Journey to the Sunrise and Sunset Beach</p>
    </div>

    <div class="swiper swiper-main swiper-container">
        <div class="swiper-wrapper">
            <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1544731612-de7f96afe55f?q=80&w=2000"></div>
            <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1590001155093-a3c66ab0c3ff?q=80&w=2000"></div>
            <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1583267746897-2cf415888172?q=80&w=2000"></div>
        </div>

        <div class="glass-timer-card">
            <div id="countdown" class="flex justify-center items-center gap-4 md:gap-8 font-black">
                <div class="timer-box text-[#fcc334]"><span id="days" class="timer-val">00</span><p class="text-[9px] uppercase text-white">Days</p></div>
                <span class="timer-val text-white mb-2">:</span>
                <div class="timer-box text-white"><span id="hours" class="timer-val">00</span><p class="text-[9px] uppercase">Hrs</p></div>
                <span class="timer-val text-white mb-2">:</span>
                <div class="timer-box text-[#fcc334]"><span id="mins" class="timer-val">00</span><p class="text-[9px] uppercase text-white">Min</p></div>
                <span class="timer-val text-white mb-2">:</span>
                <div class="timer-box text-red-500"><span id="secs" class="timer-val">00</span><p class="text-[9px] uppercase text-white">Sec</p></div>
            </div>
        </div>
    </div>

    <section class="py-10 overflow-hidden">
        <h2 class="text-3xl font-black text-center mb-6 text-[#fcc334] italic uppercase">Tour Delegates</h2>
        <div class="swiper swiper-delegates delegate-swiper">
            <div class="swiper-wrapper" id="delegate-list">
                </div>
        </div>
    </section>

    <section class="py-10 text-center bg-[#fcc334] text-[#082465]">
        <h3 class="text-xl font-black mb-4">GENERATE TOUR ID CARD</h3>
        <button id="generate-id-btn" class="bg-[#082465] text-white px-8 py-3 rounded-full font-bold shadow-xl">CLICK TO GENERATE</button>
    </section>

    <section class="py-10 container mx-auto px-4">
        <h2 class="text-2xl font-black text-center mb-6 text-[#fcc334] uppercase">Kuakata Moments</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <img src="https://images.unsplash.com/photo-1583267746897-2cf415888172?q=80&w=600" class="rounded-lg h-40 w-full object-cover">
            <img src="https://images.unsplash.com/photo-1590001155093-a3c66ab0c3ff?q=80&w=600" class="rounded-lg h-40 w-full object-cover">
            <img src="https://images.unsplash.com/photo-1544731612-de7f96afe55f?q=80&w=600" class="rounded-lg h-40 w-full object-cover">
            <img src="https://images.unsplash.com/photo-1621258673752-92f3922f37c4?q=80&w=600" class="rounded-lg h-40 w-full object-cover">
        </div>
    </section>

    <div id="id-card-popup">
        <div class="text-center p-4">
            <div id="id-card-content" class="shadow-2xl">
                <div id="id-card-header">
                    <img src="images/logo.png" class="h-8 mx-auto mb-1">
                    <h4 class="text-sm font-black">KUAKATA EXPEDITION 2026</h4>
                </div>
                <div class="p-6 text-center">
                    <div class="w-24 h-24 rounded-full border-4 border-[#fcc334] overflow-hidden mx-auto mb-3">
                        <img id="card-img" src="" class="w-full h-full object-cover">
                    </div>
                    <h3 id="card-name" class="font-black text-lg uppercase">NAME</h3>
                    <p id="card-status" class="text-xs font-bold text-blue-800">STATUS</p>
                </div>
            </div>
            <div class="mt-4 flex gap-2 justify-center">
                <button id="download-btn" class="bg-[#fcc334] text-[#082465] px-4 py-2 rounded-full font-bold text-xs">Download</button>
                <button id="close-btn" class="bg-white text-black px-4 py-2 rounded-full font-bold text-xs">Close</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBMMbqW-hZEAGFbLgCkLkwD7-KDR3976lg",
            authDomain: "kuja-web.firebaseapp.com",
            projectId: "kuja-web",
            storageBucket: "kuja-web.firebasestorage.app",
            messagingSenderId: "66586196424",
            appId: "1:66586196424:web:d018284928f5e0021068fd"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- 1. Three Dot Menu Logic (FIXED) ---
        const dot = document.getElementById('three-dots');
        const menu = document.getElementById('main-menu');
        dot.onclick = (e) => {
            e.stopPropagation();
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        };
        document.onclick = () => menu.style.display = 'none';

        // --- 2. Ultra Fast Photo Slider (FIXED) ---
        new Swiper(".swiper-main", {
            loop: true,
            autoplay: { delay: 1500, disableOnInteraction: false },
            effect: 'fade',
            speed: 800
        });

        // --- 3. Delegate Logic (FIXED Firebase + Rank) ---
        const rankMap = { "President": 1, "General Secretary": 2, "Vice President": 3, "Joint General Secretary": 4 };
        const list = document.getElementById('delegate-list');
        let firstMember = null;

        onSnapshot(collection(db, "people"), (snap) => {
            let dataArr = [];
            snap.forEach(d => dataArr.push(d.data()));
            dataArr.sort((a,b) => (rankMap[a.status] || 99) - (rankMap[b.status] || 99));

            // প্রাক্তন প্রেসিডেন্টদের তথ্য
            const formers = [
                { subject: "Rezowan Ahmmed", status: "Former President", img: "images/rezowan.jpg" },
                { subject: "Ekramul Haque", status: "Former President", img: "images/ekramul.jpg" }
            ];

            const final = [...formers, ...dataArr];
            firstMember = final[0]; // ID কার্ডের জন্য
            list.innerHTML = "";
            final.forEach(m => {
                list.innerHTML += `<div class="swiper-slide w-auto p-2">
                    <div class="delegate-card">
                        <div class="delegate-img-container"><img src="${m.img}" onerror="this.src='https://via.placeholder.com/150'"></div>
                        <h4 class="text-[12px] font-bold mt-2">${m.subject}</h4>
                        <p class="text-[9px] text-[#fcc334] font-bold uppercase">${m.status}</p>
                    </div>
                </div>`;
            });

            new Swiper(".swiper-delegates", {
                slidesPerView: 2.2,
                spaceBetween: 10,
                breakpoints: { 768: { slidesPerView: 4.5 } }
            });
        });

        // --- 4. ID Card Generate (FIXED) ---
        document.getElementById('generate-id-btn').onclick = () => {
            if(!firstMember) return;
            document.getElementById('card-img').src = firstMember.img;
            document.getElementById('card-name').innerText = firstMember.subject;
            document.getElementById('card-status').innerText = firstMember.status;
            document.getElementById('id-card-popup').style.display = 'flex';
        };
        document.getElementById('close-btn').onclick = () => document.getElementById('id-card-popup').style.display = 'none';

        document.getElementById('download-btn').onclick = () => {
            html2canvas(document.getElementById('id-card-content')).then(canvas => {
                const a = document.createElement('a');
                a.href = canvas.toDataURL();
                a.download = 'KUJA_Kuakata_ID.png';
                a.click();
            });
        };

        // --- 5. Countdown ---
        const target = new Date("April 23, 2026 00:00:00").getTime();
        setInterval(() => {
            const diff = target - new Date().getTime();
            document.getElementById('days').innerText = Math.floor(diff / 86400000);
            document.getElementById('hours').innerText = Math.floor((diff % 86400000) / 3600000);
            document.getElementById('mins').innerText = Math.floor((diff % 3600000) / 60000);
            document.getElementById('secs').innerText = Math.floor((diff % 60000) / 1000);
        }, 1000);
    </script>
</body>
</html>
