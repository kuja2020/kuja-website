<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUJA Kuakata Tour | Mega Slider</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:900&display=swap');

        body {
            background-color: #082465;
            color: white;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }

        /* Full Screen Slider */
        .swiper {
            width: 100%;
            height: 100vh;
        }

        .swiper-slide {
            position: relative;
            overflow: hidden;
        }

        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.5);
            transform: scale(1.1);
            transition: transform 5s ease;
        }

        .swiper-slide-active img {
            transform: scale(1);
        }

        /* Overlay Text */
        .slider-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            width: 100%;
        }

        .text-jikjak {
            font-size: clamp(3rem, 10vw, 8rem);
            line-height: 0.9;
            text-shadow: 10px 10px 0px #fcc334;
            letter-spacing: -5px;
        }

        /* Countdown Zigzag Style */
        .timer-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }

        .timer-box {
            background: #fcc334;
            color: #082465;
            padding: 15px;
            border-radius: 10px;
            min-width: 80px;
            transform: rotate(-5deg);
            box-shadow: 5px 5px 0px white;
        }

        .timer-box:nth-child(even) {
            transform: rotate(5deg);
            background: white;
        }

        /* Delegate Jikjak */
        .delegate-grid div:nth-child(even) {
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <div class="swiper mySwiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide">
                <img src="https://images.unsplash.com/photo-1544731612-de7f96afe55f?q=80&w=2000" alt="Kuakata Sea">
                <div class="slider-content">
                    <h1 class="text-jikjak animate__animated animate__zoomIn">SEA ADVENTURE</h1>
                </div>
            </div>
            <div class="swiper-slide">
                <img src="https://images.unsplash.com/photo-1590001155093-a3c66ab0c3ff?q=80&w=2000" alt="Rakhain Polli">
                <div class="slider-content">
                    <h1 class="text-jikjak animate__animated animate__fadeInLeft">RAKHAIN LIFE</h1>
                </div>
            </div>
            <div class="swiper-slide">
                <img src="https://images.unsplash.com/photo-1583267746897-2cf415888172?q=80&w=2000" alt="Sunrise">
                <div class="slider-content">
                    <h1 class="text-jikjak animate__animated animate__fadeInRight">SUNRISE MAGIC</h1>
                </div>
            </div>
        </div>
        
        <div class="absolute bottom-10 left-0 w-full z-20">
            <div class="timer-container">
                <div class="timer-box"><span id="days" class="text-3xl font-black">00</span><p class="text-[10px]">DAYS</p></div>
                <div class="timer-box"><span id="hours" class="text-3xl font-black">00</span><p class="text-[10px]">HOURS</p></div>
                <div class="timer-box"><span id="mins" class="text-3xl font-black">00</span><p class="text-[10px]">MINS</p></div>
                <div class="timer-box"><span id="secs" class="text-3xl font-black">00</span><p class="text-[10px]">SECS</p></div>
            </div>
        </div>
    </div>

    <section class="py-20 container mx-auto px-6">
        <h2 class="text-5xl font-black text-center mb-16 italic text-[#fcc334]">TOUR DELEGATES</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 delegate-grid">
            <div class="bg-white p-2 rounded-xl shadow-2xl transform -rotate-3">
                <img src="Profile/images/advisor/1.jpg" class="h-60 w-full object-cover rounded-lg">
                <p class="text-[#082465] font-black text-center mt-2 uppercase text-sm">Romin Al Kama</p>
            </div>
            <div class="bg-[#fcc334] p-2 rounded-xl shadow-2xl transform rotate-3">
                <img src="Profile/images/advisor/2.jpg" class="h-60 w-full object-cover rounded-lg">
                <p class="text-[#082465] font-black text-center mt-2 uppercase text-sm">Masum Hasan</p>
            </div>
            <div class="bg-white p-2 rounded-xl shadow-2xl transform -rotate-3">
                <img src="Profile/images/advisor/3.jpg" class="h-60 w-full object-cover rounded-lg">
                <p class="text-[#082465] font-black text-center mt-2 uppercase text-sm">Mirazul Islam</p>
            </div>
            <div class="bg-[#fcc334] p-2 rounded-xl shadow-2xl transform rotate-3">
                <img src="Profile/images/advisor/4.jpg" class="h-60 w-full object-cover rounded-lg">
                <p class="text-[#082465] font-black text-center mt-2 uppercase text-sm">Arko Mondol</p>
            </div>
        </div>
    </section>

    <div class="pb-20 text-center">
        <button class="bg-[#fcc334] text-[#082465] text-3xl font-black px-12 py-5 rounded-full hover:scale-110 transition animate-pulse shadow-2xl">
            LET'S GO JIKJAK!
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        // Swiper Slider Init
        var swiper = new Swiper(".mySwiper", {
            loop: true,
            autoplay: {
                delay: 4000,
                disableOnInteraction: false,
            },
            effect: "fade", // জিকজ্যাক জোকজ্যাক ট্রানজিশনের জন্য ফেইড ইফেক্ট সেরা
            speed: 1000,
        });

        // Countdown Logic
        const tourDate = new Date("April 23, 2026 00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = tourDate - now;
            document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('hours').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById('mins').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById('secs').innerText = Math.floor((diff % (1000 * 60)) / 1000);
        }, 1000);
    </script>
</body>
</html>
