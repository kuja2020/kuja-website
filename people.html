<header>

<nav>

<div class="container">
  <h2>People</h2>

  <div style="margin-bottom:20px;">
    <button onclick="showHonor()" id="honorBtn">Honor Board</button>
    <button onclick="showCurrent()" id="currentBtn">Current Members</button>
  </div>

  <div id="honorBoard">
    <h3>Honor Board</h3>
    <p>Honor Board data will load here after admin panel setup.</p>
  </div>

  <div id="currentMembers" style="display:none;">
    <h3>Current Members</h3>
    <p>Current Members data will load here after admin panel setup.</p>
  </div>
</div>

<script>
function showHonor() {
  document.getElementById("honorBoard").style.display = "block";
  document.getElementById("currentMembers").style.display = "none";
}

function showCurrent() {
  document.getElementById("honorBoard").style.display = "none";
  document.getElementById("currentMembers").style.display = "block";
}
</script>

</body>
